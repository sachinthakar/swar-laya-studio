<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Swar-Laya Studio: Professional Suite</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #eef2f3; 
            padding: 20px; 
            color: #333; 
        }
        .container { 
            max-width: 95%; 
            margin: auto; 
            background-color: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .controls { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            margin-bottom: 20px; 
            background-color: #fdfdfd; 
            padding: 20px; 
            border-radius: 10px; 
            align-items: center; 
            border: 1px solid #ddd; 
        }
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-item label {
            font-size: 11px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }
        .line-container { 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            background-color: #fff; 
            overflow-x: auto; 
            position: relative; 
        }
        .line-settings {
            display: flex;
            gap: 15px;
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            align-items: center;
        }
        .grid-row { 
            display: flex; 
            margin-bottom: 4px; 
            min-width: max-content; 
        }
        .label { 
            width: 100px; 
            font-size: 13px; 
            font-weight: bold; 
            color: #444; 
            display: flex; 
            align-items: center; 
        }
        .cell { 
            width: 120px; 
            margin-right: 5px; 
            border: 1px solid #eee; 
            padding: 4px; 
            flex-shrink: 0; 
        }
        .sub-cell-container { 
            display: flex; 
            gap: 4px; 
            flex-direction: column; 
        }
        .note-unit { 
            display: flex; 
            gap: 4px; 
            align-items: center; 
        }
        .octave-btn { 
            cursor: pointer; 
            border: 1px solid #ddd; 
            background-color: #eee; 
            font-size: 12px; 
            padding: 2px 6px; 
            border-radius: 4px; 
        }
        .octave-btn.active { 
            background-color: #333; 
            color: white; 
        }
        select, input { 
            width: 100%; 
            border: 1px solid #ddd; 
            font-size: 14px; 
            padding: 5px; 
            text-align: center; 
            border-radius: 4px; 
        }
        .note-select { 
            background-color: #fffde7; 
            font-weight: bold; 
        }
        .beat-num { 
            text-align: center; 
            font-size: 12px; 
            color: #888; 
            background-color: #f1f1f1; 
            border-radius: 4px; 
            padding: 6px 0; 
        }
        .bol-text { 
            font-size: 11px; 
            color: #d35400; 
            font-weight: bold; 
            height: 18px; 
            text-align: center; 
        }
        .playing { 
            background-color: #ffeb3b !important; 
            transform: scale(1.02); 
            transition: 0.1s; 
            border: 1px solid #fbc02d; 
        }
        button { 
            padding: 10px 18px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
        }
        .btn-tanpura { background-color: #ff9800; color: white; }
        .btn-play { background-color: #0277bd; color: white; }
        .btn-stop { background-color: #546e7a; color: white; }
        .btn-add { background-color: #2e7d32; color: white; }
        .btn-save { background-color: #455a64; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Swar-Laya Studio: Professional Suite</h2>
    
    <div class="controls">
        <div class="control-item">
            <label>Master Scale (Sa)</label>
            <select id="scale-select" onchange="updateTanpura()">
                <option value="130.81">Pandhri 1 (C)</option>
                <option value="138.59" selected>Kali 1 (C#)</option>
                <option value="146.83">Pandhri 2 (D)</option>
                <option value="155.56">Kali 2 (D#)</option>
                <option value="164.81">Pandhri 3 (E)</option>
                <option value="174.61">Pandhri 4 (F)</option>
                <option value="185.00">Kali 3 (F#)</option>
                <option value="196.00">Pandhri 5 (G)</option>
                <option value="207.65">Kali 4 (G#)</option>
                <option value="220.00">Pandhri 6 (A)</option>
                <option value="233.08">Kali 5 (A#)</option>
                <option value="246.94">Pandhri 7 (B)</option>
            </select>
        </div>

        <div class="control-item">
            <label>Default Taal</label>
            <select id="taal-select">
                <option value="4">Keherwa (4)</option>
                <option value="8">Keherwa (8)</option>
                <option value="8_bhajani">Bhajani (8)</option>
                <option value="6">Dadra (6)</option>
                <option value="7">Rupak (7)</option>
                <option value="12">Ektaal (12)</option>
                <option value="16">Teentaal (16)</option>
            </select>
        </div>

        <div class="control-item">
            <label>Master BPM</label>
            <input type="number" id="bpm" value="100">
        </div>

        <div class="control-item">
            <label>Tabla Master Vol</label>
            <input type="range" id="tabla-vol" min="0" max="1" step="0.1" value="0.5">
        </div>

        <div class="control-item">
            <label>Playback Start Beat</label>
            <input type="number" id="start-beat" min="1" value="1" style="width: 70px;">
        </div>

        <div class="control-item">
            <label>Pre-roll</label>
            <select id="pre-roll-select" style="width: 80px;">
                <option value="0">Off</option>
                <option value="2">2 Beats</option>
                <option value="4" selected>4 Beats</option>
                <option value="8">8 Beats</option>
            </select>
        </div>

        <button class="btn-tanpura" id="tanpuraBtn" onclick="toggleTanpura()">🪕 Tanpura: OFF</button>
        <button class="btn-add" onclick="addLine()">+ Add Line</button>
        <button class="btn-play" onclick="startPlayback()">▶ Play Song</button>
        <button class="btn-stop" onclick="stopPlayback()">■ Stop</button>
        <button class="btn-save" onclick="downloadFile()">💾 Save JSON</button>
        <button class="btn-save" onclick="document.getElementById('file-input').click()">📂 Load JSON</button>
        <input type="file" id="file-input" hidden onchange="loadJsonFile(event)">
    </div>

    <div id="song-sheet"></div>
</div>

<script>
    let audioCtx = null;
    let playbackInterval = null;
    let tanpuraNodes = [];
    let isTanpuraOn = false;

    let mainOscillator = null;
    let mainGainNode = null;
    let mainFilterNode = null;
    let harmonicOscillators = [];

    const SwaraMap = {
        "-": null, 
        "Sa": 1, "re": 1.059, "Re": 1.122, "ga": 1.189, "Ga": 1.26, 
        "Ma": 1.335, "ma": 1.414, "Pa": 1.498, "dha": 1.587, "Dha": 1.682, 
        "ni": 1.782, "Ni": 1.888
    };

    const TaalBols = {
        "4": ["Dha","Gi","Na","Ti"],
        "8": ["Dha","Gi","Na","Ti","Na","Ka","Dhi","Na"],
        "8_bhajani": ["Dhin","Dha","Dhin","Dhinna","Tin","Ta","Tin","Tina"],
        "6": ["Dha","Dhi","Na","Dha","Tu","Na"],
        "7": ["Ti","Ti","Na","Dhi","Na","Dhi","Na"],
        "12": ["Dhin","Dhin","Dha","Ge","Tirkit","Tirkit","Tu","Na","Kat","Ta","Dhin","Dha"],
        "16": ["Dha","Dhin","Dhin","Dha","Dha","Dhin","Dhin","Dha","Dha","Tin","Tin","Ta","Ta","Dhin","Dhin","Dha"]
    };

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTablaSound(bol, isSam) {
        const now = audioCtx.currentTime;
        const volMultiplier = parseFloat(document.getElementById('tabla-vol').value);
        
        if (bol.toLowerCase().includes("tirkit")) {
            const subDivs = [0, 0.06, 0.12, 0.18]; 
            subDivs.forEach((offset, index) => {
                const tOsc = audioCtx.createOscillator();
                const tGain = audioCtx.createGain();
                tOsc.type = "sine";
                tOsc.frequency.setValueAtTime(index % 2 === 0 ? 400 : 380, now + offset);
                tGain.gain.setValueAtTime(0.3 * volMultiplier, now + offset);
                tGain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.05);
                tOsc.connect(tGain);
                tGain.connect(audioCtx.destination);
                tOsc.start(now + offset);
                tOsc.stop(now + offset + 0.05);
            });
            return;
        }

        let weight = 0.5; 
        if (isSam) weight = 1.1; 
        else if (bol === "Dha" || bol === "Dhin") weight = 0.9;
        else if (bol === "Tin" || bol === "Na") weight = 0.6;
        else weight = 0.4; 

        if (bol.includes("Dha") || bol.includes("Dhin") || bol.includes("Dhi") || bol.includes("Ge")) {
            const bayanOsc = audioCtx.createOscillator();
            const bayanGain = audioCtx.createGain();
            let bassFreq = (bol === "Dhin") ? 60 : 70; 
            if (isSam) bassFreq -= 5;
            bayanOsc.frequency.setValueAtTime(bassFreq, now);
            bayanOsc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
            bayanGain.gain.setValueAtTime(0.85 * weight * volMultiplier, now);
            bayanGain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            bayanOsc.connect(bayanGain);
            bayanGain.connect(audioCtx.destination);
            bayanOsc.start();
            bayanOsc.stop(now + 0.45);
        }

        const dayanOsc = audioCtx.createOscillator();
        const dayanGain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = "bandpass";
        filter.Q.value = 20; 

        if (bol === "Tin" || bol === "Na" || bol === "Dhin") {
            dayanOsc.type = 'triangle';
            filter.frequency.value = (bol === "Tin") ? 620 : 440; 
            dayanGain.gain.setValueAtTime(0.65 * weight * volMultiplier, now);
            dayanGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        } else {
            dayanOsc.type = 'sine';
            filter.frequency.value = 420;
            dayanGain.gain.setValueAtTime(0.45 * weight * volMultiplier, now);
            dayanGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        }
        dayanOsc.frequency.setValueAtTime(filter.frequency.value, now);
        dayanOsc.connect(filter);
        filter.connect(dayanGain);
        dayanGain.connect(audioCtx.destination);
        dayanOsc.start();
        dayanOsc.stop(now + 0.35);
    }

    function setupMonophonicSynth(instrument) {
        if (mainOscillator) stopSynth();
        mainGainNode = audioCtx.createGain();
        mainGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        mainFilterNode = audioCtx.createBiquadFilter();
        
        let type = 'sine';
        let harmonicRatios = [];

        if (instrument === 'harmonium') {
            type = 'square'; harmonicRatios = [2.01, 3.02]; mainFilterNode.type = 'lowpass'; mainFilterNode.frequency.value = 1200;
        } else if (instrument === 'flute') {
            type = 'sine'; harmonicRatios = [2]; mainFilterNode.type = 'lowpass'; mainFilterNode.frequency.value = 2000;
        } else if (instrument === 'sitar') {
            type = 'sawtooth'; harmonicRatios = [3, 4, 5, 6]; mainFilterNode.type = 'highpass'; mainFilterNode.frequency.value = 400;
        } else if (instrument === 'violin') {
            type = 'sawtooth'; mainFilterNode.type = 'lowpass'; mainFilterNode.frequency.value = 1500;
        } else if (instrument === 'piano') {
            type = 'triangle'; mainFilterNode.type = 'lowpass'; mainFilterNode.frequency.value = 2500;
        }

        mainOscillator = audioCtx.createOscillator();
        mainOscillator.type = type;
        mainOscillator.connect(mainFilterNode);
        mainFilterNode.connect(mainGainNode);
        mainGainNode.connect(audioCtx.destination);
        mainOscillator.start();

        for (let i = 0; i < harmonicRatios.length; i++) {
            let hOsc = audioCtx.createOscillator(); hOsc.type = type;
            let hGain = audioCtx.createGain(); hGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            hOsc.connect(hGain); hGain.connect(mainFilterNode); hOsc.start();
            harmonicOscillators.push({osc: hOsc, ratio: harmonicRatios[i]});
        }
    }

    function stopSynth() {
        if (mainOscillator) { try { mainOscillator.stop(); } catch(e){} mainOscillator = null; }
        for (let i = 0; i < harmonicOscillators.length; i++) { try { harmonicOscillators[i].osc.stop(); } catch(e){} }
        harmonicOscillators = [];
        if (mainGainNode) { mainGainNode.disconnect(); mainGainNode = null; }
    }

    function updateSynthNote(freq, instrument, glideTime, noteDuration) {
        const now = audioCtx.currentTime;
        if (!freq) { mainGainNode.gain.setTargetAtTime(0, now, 0.05); return; }
        mainOscillator.frequency.exponentialRampToValueAtTime(freq, now + glideTime);
        for (let j = 0; j < harmonicOscillators.length; j++) {
            harmonicOscillators[j].osc.frequency.exponentialRampToValueAtTime(freq * harmonicOscillators[j].ratio, now + glideTime);
        }
        mainGainNode.gain.cancelScheduledValues(now);
        mainGainNode.gain.setValueAtTime(mainGainNode.gain.value, now);
        let target = 0.15;
        if (instrument === 'piano' || instrument === 'sitar') {
            mainGainNode.gain.linearRampToValueAtTime(target, now + 0.01);
            mainGainNode.gain.exponentialRampToValueAtTime(0.001, now + noteDuration * 1.5);
        } else {
            mainGainNode.gain.linearRampToValueAtTime(target, now + 0.08);
        }
    }

    function startPlayback() {
        initAudio();
        stopPlayback();
        const lines = document.querySelectorAll('.line-container');
        if (lines.length === 0) return;

        const baseSa = parseFloat(document.getElementById('scale-select').value) * 2;
        const bpm = parseInt(document.getElementById('bpm').value) || 100;
        const beatInterval = (60 / bpm) * 1000;
        const startBeatSetting = parseInt(document.getElementById('start-beat').value) || 1;
        const preRollBeats = parseInt(document.getElementById('pre-roll-select').value) || 0;

        let totalGlobalBeats = 0;
        for (let i = 0; i < lines.length; i++) {
            totalGlobalBeats += parseInt(lines[i].getAttribute('data-beats'));
        }

        let preRollCounter = preRollBeats;
        let currentGlobalBeat = (startBeatSetting - 1) % totalGlobalBeats;
        let lastInstrument = "";

        playbackInterval = setInterval(function() {
            if (preRollCounter > 0) {
                const refTaal = lines[0].getAttribute('data-taal');
                const bols = TaalBols[refTaal] || [];
                let pIdx = (currentGlobalBeat - preRollCounter + totalGlobalBeats) % totalGlobalBeats;
                playTablaSound(bols[pIdx] || "Ta", pIdx === 0);
                preRollCounter--;
                return;
            }

            if (currentGlobalBeat >= totalGlobalBeats) currentGlobalBeat = 0;

            let accumulated = 0;
            let targetLine = null;
            let localIdx = 0;

            for (let j = 0; j < lines.length; j++) {
                let b = parseInt(lines[j].getAttribute('data-beats'));
                if (currentGlobalBeat < accumulated + b) {
                    targetLine = lines[j];
                    localIdx = currentGlobalBeat - accumulated;
                    break;
                }
                accumulated += b;
            }

            const allBeats = document.querySelectorAll('.beat-num');
            for (let k = 0; k < allBeats.length; k++) allBeats[k].classList.remove('playing');

            if (targetLine) {
                const activeBeat = targetLine.querySelector(`.beat-num[data-beat-idx="${localIdx}"]`);
                if (activeBeat) activeBeat.classList.add('playing');
                
                const lineInst = targetLine.querySelector('.line-inst-select').value;
                const tablaMute = targetLine.querySelector('.line-tabla-mute').checked;

                if (lineInst !== lastInstrument) {
                    setupMonophonicSynth(lineInst);
                    lastInstrument = lineInst;
                }

                if (!tablaMute) {
                    const taalKey = targetLine.getAttribute('data-taal');
                    const bols = TaalBols[taalKey] || [];
                    playTablaSound(bols[localIdx] || "Ta", localIdx === 0);
                }

                const noteCells = targetLine.querySelectorAll('.grid-row')[1].querySelectorAll('.cell');
                const units = noteCells[localIdx].querySelectorAll('.note-unit');
                const subInterval = beatInterval / units.length;

                for (let m = 0; m < units.length; m++) {
                    (function(unit, sIdx) {
                        setTimeout(function() {
                            const swara = unit.querySelector('.note-select').value;
                            const ratio = SwaraMap[swara];
                            if (ratio) {
                                let freq = baseSa * ratio;
                                const octBtn = unit.querySelector('.octave-btn.active');
                                if (octBtn) freq *= (octBtn.innerText === '˙' ? 2 : 0.5);
                                updateSynthNote(freq, lineInst, (subInterval / 1000) * 0.15, subInterval / 1000);
                            } else {
                                updateSynthNote(null, lineInst, 0.05, 0.1);
                            }
                        }, sIdx * subInterval);
                    })(units[m], m);
                }
            }
            currentGlobalBeat++;
        }, beatInterval);
    }

    function stopPlayback() {
        if (playbackInterval) clearInterval(playbackInterval);
        stopSynth();
        const allBeats = document.querySelectorAll('.beat-num');
        for (let j = 0; j < allBeats.length; j++) allBeats[j].classList.remove('playing');
    }

    function addLine(data = null) {
        const taalSelector = document.getElementById('taal-select');
        const taalKey = data ? data.taal_key : taalSelector.value;
        const beats = parseInt(taalKey) || 8; 
        const subs = data ? data.notes[0].length : 1;
        const sheet = document.getElementById('song-sheet');
        const line = document.createElement('div');
        line.className = 'line-container';
        line.setAttribute('data-beats', beats);
        line.setAttribute('data-taal', taalKey);
        
        let settings = document.createElement('div');
        settings.className = 'line-settings';
        let instVal = data ? data.line_instrument : "harmonium";
        let muteVal = data ? data.tabla_mute : false;
        settings.innerHTML = `
            <label style="font-size:11px;">Instrument:</label>
            <select class="line-inst-select" style="width:120px;">
                <option value="harmonium" ${instVal==='harmonium'?'selected':''}>Harmonium</option>
                <option value="flute" ${instVal==='flute'?'selected':''}>Flute</option>
                <option value="sitar" ${instVal==='sitar'?'selected':''}>Sitar</option>
                <option value="violin" ${instVal==='violin'?'selected':''}>Violin</option>
                <option value="piano" ${instVal==='piano'?'selected':''}>Piano</option>
            </select>
            <label style="font-size:11px; margin-left:10px;">Mute Tabla:</label>
            <input type="checkbox" class="line-tabla-mute" ${muteVal?'checked':''} style="width:20px;">
        `;
        line.appendChild(settings);

        let rowLyrics = document.createElement('div');
        rowLyrics.className = 'grid-row';
        rowLyrics.innerHTML = `<div class="label">Lyrics</div>`;
        for (let i = 0; i < beats; i++) {
            rowLyrics.innerHTML += `<div class="cell"><input type="text" class="lyr" value="${data?data.lyrics[i]:''}"></div>`;
        }
        let rowNotes = document.createElement('div');
        rowNotes.className = 'grid-row';
        rowNotes.innerHTML = `<div class="label">Notes</div>`;
        for (let i = 0; i < beats; i++) {
            let cell = document.createElement('div'); cell.className = 'cell';
            let sub = document.createElement('div'); sub.className = 'sub-cell-container';
            for (let s = 0; s < subs; s++) {
                let noteVal = data ? data.notes[i][s] : "-";
                let octVal = data ? data.octaves[i][s] : 0;
                let unit = document.createElement('div'); unit.className = 'note-unit';
                let select = `<select class="note-select">`;
                for (let swara in SwaraMap) select += `<option ${swara===noteVal?'selected':''}>${swara}</option>`;
                select += `</select>`;
                unit.innerHTML = select + `<div class="octave-controls"><button class="octave-btn ${octVal===1?'active':''}" onclick="toggleOctave(this, 1)">˙</button><button class="octave-btn ${octVal===-1?'active':''}" onclick="toggleOctave(this, -1)">.</button></div>`;
                sub.appendChild(unit);
            }
            cell.appendChild(sub); rowNotes.appendChild(cell);
        }
        let rowBeats = document.createElement('div');
        rowBeats.className = 'grid-row';
        rowBeats.innerHTML = `<div class="label">Beat</div>`;
        const bols = TaalBols[taalKey] || [];
        for (let i = 0; i < beats; i++) {
            rowBeats.innerHTML += `<div class="cell beat-num" data-beat-idx="${i}"><div class="bol-text">${bols[i]||''}</div>${i+1}</div>`;
        }
        line.appendChild(rowLyrics); line.appendChild(rowNotes); line.appendChild(rowBeats);
        let rem = document.createElement('button'); rem.innerText = "×"; rem.style.position = "absolute"; rem.style.top = "5px"; rem.style.right = "5px";
        rem.onclick = function() { line.remove(); }; line.appendChild(rem); sheet.appendChild(line);
    }

    function toggleOctave(btn, val) {
        const parent = btn.parentElement; const btns = parent.querySelectorAll('.octave-btn');
        const active = btn.classList.contains('active');
        for (let i = 0; i < btns.length; i++) btns[i].classList.remove('active');
        if (!active) btn.classList.add('active');
    }

    function toggleTanpura() {
        initAudio(); isTanpuraOn = !isTanpuraOn; const btn = document.getElementById('tanpuraBtn');
        if (isTanpuraOn) { btn.innerText = "🪕 Tanpura: ON"; playTanpura(); } else { btn.innerText = "🪕 Tanpura: OFF"; stopTanpura(); }
    }

    function playTanpura() {
        stopTanpura(); const base = parseFloat(document.getElementById('scale-select').value);
        const freqs = [base * 0.75, base, base, base * 0.5];
        for (let i = 0; i < freqs.length; i++) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sawtooth'; o.frequency.value = freqs[i]; g.gain.value = 0.01;
            o.connect(g); g.connect(audioCtx.destination); o.start(); tanpuraNodes.push(o);
        }
    }

    function stopTanpura() { for (let i = 0; i < tanpuraNodes.length; i++) tanpuraNodes[i].stop(); tanpuraNodes = []; }
    function updateTanpura() { if (isTanpuraOn) playTanpura(); }

    function downloadFile() {
        const allLines = document.querySelectorAll('.line-container');
        const lineArray = [];
        for (let i = 0; i < allLines.length; i++) {
            const l = allLines[i];
            const lyrInputs = l.querySelectorAll('.lyr'); const lyricList = [];
            for (let j = 0; j < lyrInputs.length; j++) lyricList.push(lyrInputs[j].value);
            const subContainers = l.querySelectorAll('.sub-cell-container');
            const noteList = []; const octaveList = [];
            for (let k = 0; k < subContainers.length; k++) {
                const selects = subContainers[k].querySelectorAll('.note-select');
                const units = subContainers[k].querySelectorAll('.note-unit');
                const nRow = []; const oRow = [];
                for (let m = 0; m < selects.length; m++) {
                    nRow.push(selects[m].value);
                    const activeOct = units[m].querySelector('.octave-btn.active');
                    oRow.push(activeOct ? (activeOct.innerText === '˙' ? 1 : -1) : 0);
                }
                noteList.push(nRow); octaveList.push(oRow);
            }
            lineArray.push({ 
                lyrics: lyricList, notes: noteList, octaves: octaveList, 
                beats: l.getAttribute('data-beats'), taal_key: l.getAttribute('data-taal'),
                line_instrument: l.querySelector('.line-inst-select').value,
                tabla_mute: l.querySelector('.line-tabla-mute').checked
            });
        }
        const blob = new Blob([JSON.stringify({ scale: document.getElementById('scale-select').value, lines: lineArray }, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'song.json'; a.click();
    }

    function loadJsonFile(e) {
        const r = new FileReader();
        r.onload = function(ev) {
            const d = JSON.parse(ev.target.result);
            document.getElementById('scale-select').value = d.scale;
            document.getElementById('song-sheet').innerHTML = "";
            for (let i = 0; i < d.lines.length; i++) addLine(d.lines[i]);
        };
        r.readAsText(e.target.files[0]);
    }
    addLine();
</script>
</body>
</html>
