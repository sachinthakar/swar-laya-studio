<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Swar-Laya Studio: Professional Suite</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #eef2f3; 
            padding: 20px; 
            color: #333; 
        }
        .container { 
            max-width: 95%; 
            margin: auto; 
            background-color: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .controls { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            margin-bottom: 20px; 
            background-color: #fdfdfd; 
            padding: 20px; 
            border-radius: 10px; 
            align-items: center; 
            border: 1px solid #ddd; 
        }
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-item label {
            font-size: 11px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }
        .line-container { 
            border: 1px solid #ccc; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            background-color: #fff; 
            overflow-x: auto; 
            position: relative; 
        }
        .grid-row { 
            display: flex; 
            margin-bottom: 4px; 
            min-width: max-content; 
        }
        .label { 
            width: 100px; 
            font-size: 13px; 
            font-weight: bold; 
            color: #444; 
            display: flex; 
            align-items: center; 
        }
        .cell { 
            width: 120px; 
            margin-right: 5px; 
            border: 1px solid #eee; 
            padding: 4px; 
            flex-shrink: 0; 
        }
        .sub-cell-container { 
            display: flex; 
            gap: 4px; 
            flex-direction: column; 
        }
        .note-unit { 
            display: flex; 
            gap: 4px; 
            align-items: center; 
        }
        .octave-btn { 
            cursor: pointer; 
            border: 1px solid #ddd; 
            background-color: #eee; 
            font-size: 12px; 
            padding: 2px 6px; 
            border-radius: 4px; 
        }
        .octave-btn.active { 
            background-color: #333; 
            color: white; 
        }
        select, input { 
            width: 100%; 
            border: 1px solid #ddd; 
            font-size: 14px; 
            padding: 5px; 
            text-align: center; 
            border-radius: 4px; 
        }
        .note-select { 
            background-color: #fffde7; 
            font-weight: bold; 
        }
        .beat-num { 
            text-align: center; 
            font-size: 12px; 
            color: #888; 
            background-color: #f1f1f1; 
            border-radius: 4px; 
            padding: 6px 0; 
        }
        .bol-text { 
            font-size: 11px; 
            color: #d35400; 
            font-weight: bold; 
            height: 18px; 
            text-align: center; 
        }
        .playing { 
            background-color: #ffeb3b !important; 
            transform: scale(1.02); 
            transition: 0.1s; 
            border: 1px solid #fbc02d; 
        }
        button { 
            padding: 10px 18px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
        }
        .btn-tanpura { background-color: #ff9800; color: white; }
        .btn-play { background-color: #0277bd; color: white; }
        .btn-stop { background-color: #546e7a; color: white; }
        .btn-add { background-color: #2e7d32; color: white; }
        .btn-save { background-color: #455a64; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Swar-Laya Studio: Professional Suite</h2>
    
    <div class="controls">
        <div class="control-item">
            <label>Instrument</label>
            <select id="inst-select">
                <option value="harmonium">Harmonium (Reed)</option>
                <option value="flute">Flute (Bansuri)</option>
                <option value="sitar">Sitar (Plucked)</option>
                <option value="violin">Violin (Bowed)</option>
                <option value="piano">Piano (Percussive)</option>
            </select>
        </div>

        <div class="control-item">
            <label>Scale (Sa)</label>
            <select id="scale-select" onchange="updateTanpura()">
                <option value="130.81">Pandhri 1 (C)</option>
                <option value="138.59" selected>Kali 1 (C#)</option>
                <option value="146.83">Pandhri 2 (D)</option>
                <option value="155.56">Kali 2 (D#)</option>
                <option value="164.81">Pandhri 3 (E)</option>
                <option value="174.61">Pandhri 4 (F)</option>
                <option value="185.00">Kali 3 (F#)</option>
                <option value="196.00">Pandhri 5 (G)</option>
                <option value="207.65">Kali 4 (G#)</option>
                <option value="220.00">Pandhri 6 (A)</option>
                <option value="233.08">Kali 5 (A#)</option>
                <option value="246.94">Pandhri 7 (B)</option>
            </select>
        </div>

        <div class="control-item">
            <label>Taal</label>
            <select id="taal-select">
                <option value="4">Keherwa (4)</option>
                <option value="8">Keherwa (8)</option>
                <option value="8_bhajani">Bhajani (8)</option>
                <option value="6">Dadra (6)</option>
                <option value="7">Rupak (7)</option>
                <option value="12">Ektaal (12)</option>
                <option value="16">Teentaal (16)</option>
            </select>
        </div>

        <div class="control-item">
            <label>BPM</label>
            <input type="number" id="bpm" value="100">
        </div>

        <div class="control-item">
            <label>Tabla Vol</label>
            <input type="range" id="tabla-vol" min="0" max="1" step="0.1" value="0.5">
        </div>

        <button class="btn-tanpura" id="tanpuraBtn" onclick="toggleTanpura()">🪕 Tanpura: OFF</button>
        <button class="btn-add" onclick="addLine()">+ Add Line</button>
        <button class="btn-play" onclick="startPlayback()">▶ Play Song</button>
        <button class="btn-stop" onclick="stopPlayback()">■ Stop</button>
        <button class="btn-save" onclick="downloadFile()">💾 Save JSON</button>
        <button class="btn-save" onclick="document.getElementById('file-input').click()">📂 Load JSON</button>
        <input type="file" id="file-input" hidden onchange="loadJsonFile(event)">
    </div>

    <div id="song-sheet"></div>
</div>

<script>
    let audioCtx = null;
    let playbackInterval = null;
    let tanpuraNodes = [];
    let isTanpuraOn = false;

    // Monophonic Synth Global State
    let mainOscillator = null;
    let mainGainNode = null;
    let mainFilterNode = null;
    let harmonicOscillators = [];

    const SwaraMap = {
        "-": null, 
        "Sa": 1, "re": 1.059, "Re": 1.122, "ga": 1.189, "Ga": 1.26, 
        "Ma": 1.335, "ma": 1.414, "Pa": 1.498, "dha": 1.587, "Dha": 1.682, 
        "ni": 1.782, "Ni": 1.888
    };

    const TaalBols = {
        "4": ["Dha","Gi","Na","Ti"],
        "8": ["Dha","Gi","Na","Ti","Na","Ka","Dhi","Na"],
        "8_bhajani": ["Dhin","Dha","Dhin","Dhinna","Tin","Ta","Tin","Tina"],
        "6": ["Dha","Dhi","Na","Dha","Tu","Na"],
        "7": ["Ti","Ti","Na","Dhi","Na","Dhi","Na"],
        "12": ["Dhin","Dhin","Dha","Ge","Ti","Re","Ke","Te","Tu","Na","Kat","Ta"],
        "16": ["Dha","Dhin","Dhin","Dha","Dha","Dhin","Dhin","Dha","Dha","Tin","Tin","Ta","Ta","Dhin","Dhin","Dha"]
    };

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // Tabla Synthesis Engine
    function playTablaSound(bol, isSam) {
        const now = audioCtx.currentTime;
        const volMultiplier = parseFloat(document.getElementById('tabla-vol').value);
        
        // Bayan (Bass Drum) - Low sine with pitch drop
        if (bol.includes("Dha") || bol.includes("Dhin") || bol.includes("Dhi") || bol.includes("Ge")) {
            const bayanOsc = audioCtx.createOscillator();
            const bayanGain = audioCtx.createGain();
            bayanOsc.frequency.setValueAtTime(isSam ? 70 : 85, now);
            bayanOsc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
            bayanGain.gain.setValueAtTime(0.3 * volMultiplier, now);
            bayanGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            bayanOsc.connect(bayanGain);
            bayanGain.connect(audioCtx.destination);
            bayanOsc.start();
            bayanOsc.stop(now + 0.3);
        }

        // Dayan (Treble Drum) - Metallic resonant sound
        const dayanOsc = audioCtx.createOscillator();
        const dayanGain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        filter.type = "bandpass";
        filter.frequency.value = 440; // Tuned Dayan
        filter.Q.value = 10;

        dayanOsc.type = (bol.includes("Na") || bol.includes("Ta") || bol.includes("Tin")) ? "triangle" : "sine";
        dayanOsc.frequency.setValueAtTime(isSam ? 440 : 450, now);
        
        dayanGain.gain.setValueAtTime(0.2 * volMultiplier, now);
        dayanGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        
        dayanOsc.connect(filter);
        filter.connect(dayanGain);
        dayanGain.connect(audioCtx.destination);
        
        dayanOsc.start();
        dayanOsc.stop(now + 0.1);
    }

    function setupMonophonicSynth(instrument) {
        mainGainNode = audioCtx.createGain();
        mainGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        mainFilterNode = audioCtx.createBiquadFilter();
        
        let type = 'sine';
        let harmonicRatios = [];

        if (instrument === 'harmonium') {
            type = 'square';
            harmonicRatios = [2.01, 3.02]; 
            mainFilterNode.type = 'lowpass';
            mainFilterNode.frequency.value = 1200;
        } else if (instrument === 'flute') {
            type = 'sine';
            harmonicRatios = [2];
            mainFilterNode.type = 'lowpass';
            mainFilterNode.frequency.value = 2000;
        } else if (instrument === 'sitar') {
            type = 'sawtooth';
            harmonicRatios = [3, 4, 5, 6]; 
            mainFilterNode.type = 'highpass';
            mainFilterNode.frequency.value = 400;
        } else if (instrument === 'violin') {
            type = 'sawtooth';
            mainFilterNode.type = 'lowpass';
            mainFilterNode.frequency.value = 1500;
        } else if (instrument === 'piano') {
            type = 'triangle';
            mainFilterNode.type = 'lowpass';
            mainFilterNode.frequency.value = 2500;
        }

        mainOscillator = audioCtx.createOscillator();
        mainOscillator.type = type;
        mainOscillator.connect(mainFilterNode);
        mainFilterNode.connect(mainGainNode);
        mainGainNode.connect(audioCtx.destination);
        mainOscillator.start();

        for (let i = 0; i < harmonicRatios.length; i++) {
            let ratio = harmonicRatios[i];
            let hOsc = audioCtx.createOscillator();
            hOsc.type = type;
            let hGain = audioCtx.createGain();
            hGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            hOsc.connect(hGain);
            hGain.connect(mainFilterNode);
            hOsc.start();
            harmonicOscillators.push({osc: hOsc, ratio: ratio});
        }
    }

    function updateSynthNote(freq, instrument, glideTime, noteDuration) {
        const now = audioCtx.currentTime;
        if (!freq) {
            mainGainNode.gain.setTargetAtTime(0, now, 0.05);
            return;
        }

        mainOscillator.frequency.exponentialRampToValueAtTime(freq, now + glideTime);
        for (let j = 0; j < harmonicOscillators.length; j++) {
            let h = harmonicOscillators[j];
            h.osc.frequency.exponentialRampToValueAtTime(freq * h.ratio, now + glideTime);
        }

        mainGainNode.gain.cancelScheduledValues(now);
        mainGainNode.gain.setValueAtTime(mainGainNode.gain.value, now);

        if (instrument === 'sitar') {
            mainGainNode.gain.linearRampToValueAtTime(0.3, now + 0.01);
            mainGainNode.gain.exponentialRampToValueAtTime(0.02, now + noteDuration);
        } else if (instrument === 'piano') {
            mainGainNode.gain.linearRampToValueAtTime(0.25, now + 0.005);
            mainGainNode.gain.exponentialRampToValueAtTime(0.001, now + noteDuration * 1.5);
        } else if (instrument === 'violin') {
            mainGainNode.gain.linearRampToValueAtTime(0.2, now + 0.1);
            mainGainNode.gain.linearRampToValueAtTime(0.15, now + noteDuration);
        } else if (instrument === 'harmonium') {
            mainGainNode.gain.linearRampToValueAtTime(0.18, now + 0.05);
        } else {
            mainGainNode.gain.linearRampToValueAtTime(0.15, now + 0.08);
        }
    }

    function startPlayback() {
        initAudio();
        stopPlayback();
        const lines = document.querySelectorAll('.line-container');
        if (lines.length === 0) return;

        const instrument = document.getElementById('inst-select').value;
        const baseSa = parseFloat(document.getElementById('scale-select').value) * 2;
        const bpm = parseInt(document.getElementById('bpm').value) || 100;
        const beatInterval = (60 / bpm) * 1000;
        
        setupMonophonicSynth(instrument);

        let totalGlobalBeats = 0;
        for (let i = 0; i < lines.length; i++) {
            totalGlobalBeats += parseInt(lines[i].getAttribute('data-beats'));
        }

        let currentGlobalBeat = 0;

        playbackInterval = setInterval(function() {
            if (currentGlobalBeat >= totalGlobalBeats) {
                currentGlobalBeat = 0;
            }

            let accumulated = 0;
            let targetLine = null;
            let localIdx = 0;

            for (let j = 0; j < lines.length; j++) {
                let b = parseInt(lines[j].getAttribute('data-beats'));
                if (currentGlobalBeat < accumulated + b) {
                    targetLine = lines[j];
                    localIdx = currentGlobalBeat - accumulated;
                    break;
                }
                accumulated += b;
            }

            const allBeats = document.querySelectorAll('.beat-num');
            for (let k = 0; k < allBeats.length; k++) {
                allBeats[k].classList.remove('playing');
            }

            if (targetLine) {
                const activeBeat = targetLine.querySelector(`.beat-num[data-beat-idx="${localIdx}"]`);
                if (activeBeat) {
                    activeBeat.classList.add('playing');
                }
                
                // Play Tabla Bols based on Taal
                const taalKey = targetLine.getAttribute('data-taal');
                const bols = TaalBols[taalKey] || [];
                const currentBol = bols[localIdx] || "Ta";
                playTablaSound(currentBol, localIdx === 0);

                const noteCells = targetLine.querySelectorAll('.grid-row')[1].querySelectorAll('.cell');
                const units = noteCells[localIdx].querySelectorAll('.note-unit');
                const subInterval = beatInterval / units.length;

                for (let m = 0; m < units.length; m++) {
                    (function(unit, sIdx) {
                        setTimeout(function() {
                            const swara = unit.querySelector('.note-select').value;
                            const ratio = SwaraMap[swara];
                            if (ratio) {
                                let freq = baseSa * ratio;
                                const octBtn = unit.querySelector('.octave-btn.active');
                                if (octBtn) {
                                    if (octBtn.innerText === '˙') {
                                        freq *= 2;
                                    } else {
                                        freq *= 0.5;
                                    }
                                }
                                let glide = (subInterval / 1000) * 0.15; 
                                updateSynthNote(freq, instrument, glide, subInterval / 1000);
                            } else {
                                updateSynthNote(null, instrument, 0.05, 0.1);
                            }
                        }, sIdx * subInterval);
                    })(units[m], m);
                }
            }
            currentGlobalBeat++;
        }, beatInterval);
    }

    function stopPlayback() {
        if (playbackInterval) {
            clearInterval(playbackInterval);
        }
        if (mainOscillator) {
            try { mainOscillator.stop(); } catch(e){}
            mainOscillator = null;
        }
        for (let i = 0; i < harmonicOscillators.length; i++) {
            try { harmonicOscillators[i].osc.stop(); } catch(e){}
        }
        harmonicOscillators = [];
        if (mainGainNode) {
            mainGainNode.disconnect();
            mainGainNode = null;
        }
        const allBeats = document.querySelectorAll('.beat-num');
        for (let j = 0; j < allBeats.length; j++) {
            allBeats[j].classList.remove('playing');
        }
    }

    function addLine(data = null) {
        const taalSelector = document.getElementById('taal-select');
        const taalKey = data ? data.taal_key : taalSelector.value;
        const beats = parseInt(taalKey) || 8; 
        const subs = data ? data.notes[0].length : 1;
        
        const sheet = document.getElementById('song-sheet');
        const line = document.createElement('div');
        line.className = 'line-container';
        line.setAttribute('data-beats', beats);
        line.setAttribute('data-taal', taalKey);
        
        // Row 1: Lyrics
        let rowLyrics = document.createElement('div');
        rowLyrics.className = 'grid-row';
        rowLyrics.innerHTML = `<div class="label">Lyrics</div>`;
        for (let i = 0; i < beats; i++) {
            let lVal = data ? data.lyrics[i] : "";
            rowLyrics.innerHTML += `<div class="cell"><input type="text" class="lyr" value="${lVal}"></div>`;
        }

        // Row 2: Notes
        let rowNotes = document.createElement('div');
        rowNotes.className = 'grid-row';
        rowNotes.innerHTML = `<div class="label">Notes</div>`;
        for (let i = 0; i < beats; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            let subContainer = document.createElement('div');
            subContainer.className = 'sub-cell-container';
            for (let s = 0; s < subs; s++) {
                let noteVal = data ? data.notes[i][s] : "-";
                let octVal = data ? data.octaves[i][s] : 0;
                let unit = document.createElement('div');
                unit.className = 'note-unit';
                
                let select = `<select class="note-select">`;
                for (let swara in SwaraMap) {
                    let selectedAttr = (swara === noteVal) ? 'selected' : '';
                    select += `<option ${selectedAttr}>${swara}</option>`;
                }
                select += `</select>`;
                
                let oct1Active = (octVal === 1) ? 'active' : '';
                let octM1Active = (octVal === -1) ? 'active' : '';
                
                unit.innerHTML = select + `
                    <div class="octave-controls">
                        <button class="octave-btn ${oct1Active}" onclick="toggleOctave(this, 1)">˙</button>
                        <button class="octave-btn ${octM1Active}" onclick="toggleOctave(this, -1)">.</button>
                    </div>`;
                subContainer.appendChild(unit);
            }
            cell.appendChild(subContainer);
            rowNotes.appendChild(cell);
        }

        // Row 3: Beats
        let rowBeats = document.createElement('div');
        rowBeats.className = 'grid-row';
        rowBeats.innerHTML = `<div class="label">Beat</div>`;
        const bols = TaalBols[taalKey] || [];
        for (let i = 0; i < beats; i++) {
            let bol = bols[i] || '';
            rowBeats.innerHTML += `
                <div class="cell beat-num" data-beat-idx="${i}">
                    <div class="bol-text">${bol}</div>
                    ${i + 1}
                </div>`;
        }

        line.appendChild(rowLyrics);
        line.appendChild(rowNotes);
        line.appendChild(rowBeats);
        
        let removeBtn = document.createElement('button');
        removeBtn.innerText = "×";
        removeBtn.style.position = "absolute";
        removeBtn.style.top = "5px";
        removeBtn.style.right = "5px";
        removeBtn.onclick = function() { line.remove(); };
        line.appendChild(removeBtn);
        
        sheet.appendChild(line);
    }

    function toggleOctave(btn, val) {
        const parent = btn.parentElement;
        const isAlreadyActive = btn.classList.contains('active');
        const btns = parent.querySelectorAll('.octave-btn');
        for (let i = 0; i < btns.length; i++) {
            btns[i].classList.remove('active');
        }
        if (!isAlreadyActive) {
            btn.classList.add('active');
        }
    }

    function toggleTanpura() {
        initAudio();
        isTanpuraOn = !isTanpuraOn;
        const btn = document.getElementById('tanpuraBtn');
        if (isTanpuraOn) {
            btn.innerText = "🪕 Tanpura: ON";
            playTanpura();
        } else {
            btn.innerText = "🪕 Tanpura: OFF";
            stopTanpura();
        }
    }

    function playTanpura() {
        stopTanpura();
        const base = parseFloat(document.getElementById('scale-select').value);
        const freqs = [base * 0.75, base, base, base * 0.5];
        for (let i = 0; i < freqs.length; i++) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.value = freqs[i];
            g.gain.value = 0.01;
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start();
            tanpuraNodes.push(o);
        }
    }

    function stopTanpura() {
        for (let i = 0; i < tanpuraNodes.length; i++) {
            tanpuraNodes[i].stop();
        }
        tanpuraNodes = [];
    }

    function updateTanpura() {
        if (isTanpuraOn) {
            playTanpura();
        }
    }

    function downloadFile() {
        const allLines = document.querySelectorAll('.line-container');
        const lineArray = [];
        for (let i = 0; i < allLines.length; i++) {
            const l = allLines[i];
            const lyrInputs = l.querySelectorAll('.lyr');
            const lyricList = [];
            for (let j = 0; j < lyrInputs.length; j++) {
                lyricList.push(lyrInputs[j].value);
            }
            
            const subContainers = l.querySelectorAll('.sub-cell-container');
            const noteList = [];
            const octaveList = [];
            for (let k = 0; k < subContainers.length; k++) {
                const selects = subContainers[k].querySelectorAll('.note-select');
                const units = subContainers[k].querySelectorAll('.note-unit');
                const nRow = [];
                const oRow = [];
                for (let m = 0; m < selects.length; m++) {
                    nRow.push(selects[m].value);
                    const activeOct = units[m].querySelector('.octave-btn.active');
                    let oVal = 0;
                    if (activeOct) {
                        oVal = (activeOct.innerText === '˙') ? 1 : -1;
                    }
                    oRow.push(oVal);
                }
                noteList.push(nRow);
                octaveList.push(oRow);
            }
            
            lineArray.push({
                lyrics: lyricList,
                notes: noteList,
                octaves: octaveList,
                beats: l.getAttribute('data-beats'),
                taal_key: l.getAttribute('data-taal')
            });
        }
        
        const songObj = {
            scale: document.getElementById('scale-select').value,
            lines: lineArray
        };
        
        const blob = new Blob([JSON.stringify(songObj, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'song.json';
        a.click();
    }

    function loadJsonFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const data = JSON.parse(ev.target.result);
            document.getElementById('scale-select').value = data.scale;
            document.getElementById('song-sheet').innerHTML = "";
            for (let i = 0; i < data.lines.length; i++) {
                addLine(data.lines[i]);
            }
        };
        reader.readAsText(file);
    }

    addLine();
</script>
</body>
</html>
